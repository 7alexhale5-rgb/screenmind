name: Feature request
description: Propose a new capability or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening, check `.planning/BACKLOG.md` — it may already be triaged.
  - type: textarea
    id: use-case
    attributes:
      label: What's the use case?
      description: What are you trying to do that ScreenMind can't do today?
    validations:
      required: true
  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: If you have an idea for the shape, paste it here. Otherwise leave blank and we'll talk it through.
    validations:
      required: false
  - type: dropdown
    id: surface
    attributes:
      label: Which tool(s) does this touch?
      options:
        - screenmind_watch
        - screenmind_wait_for_change
        - screenmind_search
        - screenmind_record_start / _stop
        - screenmind_list
        - screenmind_status
        - new tool
        - doc/install/CI
        - other
    validations:
      required: true
  - type: checkboxes
    id: involvement
    attributes:
      label: I'd be willing to...
      options:
        - label: Open a PR
        - label: Help test
        - label: Just report and let someone else build
